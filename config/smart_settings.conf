[mode]
# off = 关闭全部 | on = 开启全部 | smart = 智能模式
global=smart

[daemon]
enabled=true
check_interval=5
io_idle_seconds=8
network_probe_interval=30
disk_power_probe_interval=60
hotplug_check_interval=30

[activity]
disk_blink=false
network_blink=false
disk_threshold_kbps=128
network_threshold_kbps=32

[disk_colors]
active=0 255 0
idle=255 255 0
standby=0 100 255
deep_sleep=40 0 80
offline=off

[disk_brightness]
active=128
idle=64
standby=40
deep_sleep=24
offline=0

[netdev_colors]
disconnected=255 0 0
connected=0 80 255
vpn=160 0 255

[netdev_brightness]
disconnected=64
connected=48
vpn=64

[power]
smart_color=100 100 100
all_on_color=180 180 180
brightness=40

[hardware]
# auto：按 DMI 产品名选择档案；可手动填 dxp6800、dxp8800 等。
profile=auto
# auto：由档案选择；仅在排障时才指定 legacy 或 smbus-block。
write_protocol=auto

[all_on]
color=180 180 180
brightness=64

[behavior]
remap_on_hotplug=true
manage_power=true
manage_netdev=true

[disk_map]
