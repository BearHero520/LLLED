# Optional manual disk-to-LED overrides.
#
# Leave this file without active entries to use the model profile and automatic
# HCTL mapping. This is required for DXP6800 Pro, whose physical slot order is
# not disk1..disk6 in HCTL order.
#
# Examples (uncomment only after checking `sudo LLLED remap`):
# /dev/sda=disk1
# /dev/sdb=disk2
# /dev/sdc=disk3
# /dev/sdd=disk4
#
# DXP6800 Pro / DXP8800 Plus can also use disk5..disk8 where present.
