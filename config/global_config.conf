# LLLED 项目全局配置

LLLED_VERSION="4.1.0"
PROJECT_NAME="LLLED"
PROJECT_DESCRIPTION="绿联 LED 智能控制系统"
PROJECT_AUTHOR="BearHero520"
GITHUB_REPO="BearHero520/LLLED"
LAST_UPDATE="2026-07-20"

INSTALL_DIR="/opt/ugreen-led-controller"
CONFIG_DIR="$INSTALL_DIR/config"
SCRIPTS_DIR="$INSTALL_DIR/scripts"
LOG_DIR="/var/log/llled"
RUNTIME_DIR="/run/llled"

MAIN_CONFIG_FILE="$CONFIG_DIR/smart_settings.conf"
DISK_MAPPING_FILE="$CONFIG_DIR/disk_mapping.conf"
HCTL_MAPPING_FILE="$CONFIG_DIR/hctl_mapping.conf"
UGREEN_CLI="$INSTALL_DIR/ugreen_leds_cli"

SERVICE_NAME="ugreen-led-monitor"
SERVICE_FILE="/etc/systemd/system/${SERVICE_NAME}.service"
LOG_FILE="$LOG_DIR/${SERVICE_NAME}.log"
PID_FILE="$RUNTIME_DIR/daemon.pid"

DISK_CHECK_INTERVAL=5
DISK_POWER_PROBE_INTERVAL=60
HOTPLUG_CHECK_INTERVAL=30
NETWORK_PROBE_INTERVAL=30
SUPPORTED_MODELS=(
    "UGREEN DX4600 Pro"
    "UGREEN DX4700+"
    "UGREEN DXP2800"
    "UGREEN DXP4800"
    "UGREEN DXP4800 Plus"
    "UGREEN DXP6800 Pro"
    "UGREEN DXP8800 Plus"
)

EXPERIMENTAL_MODELS=(
    "UGREEN DXP2800 GT"
    "UGREEN DXP4800 GT"
    "UGREEN DXP4800S"
    "UGREEN iDX6011"
    "UGREEN iDX6011 Pro"
    "UGREEN iDX6012"
)

UNVERIFIED_MODELS=(
    "UGREEN DXP2800 GT"
    "UGREEN DXP4800 Pro"
)
